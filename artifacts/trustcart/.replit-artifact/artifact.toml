kind = "web"
previewPath = "/"
title = "TrustCart AI+"
version = "1.0.0"
id = "artifacts/trustcart"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21194

[services.development]
run = "pnpm --filter @workspace/trustcart run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trustcart", "run", "build" ]
publicDir = "artifacts/trustcart/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21194"
BASE_PATH = "/"
